# Midas — one-command self-hosted deploy.
#
#   cp .env.example .env     # optional: set provider / API keys
#   docker compose up -d     # build + run
#   open http://localhost:8080
#
# The web container (nginx) serves the SPA and reverse-proxies /api to the
# server container, so the browser only ever talks to one origin.

services:
  server:
    build:
      context: .
      target: server
    environment:
      # mock (default, offline) | yahoo | ccxt
      MIDAS_DATA_PROVIDER: ${MIDAS_DATA_PROVIDER:-mock}
      # ccxt: which exchange to pull market data from
      MIDAS_CCXT_EXCHANGE: ${MIDAS_CCXT_EXCHANGE:-binance}
      # ccxt: venues compared in the ALLQ multi-exchange module
      MIDAS_CCXT_COMPARE: ${MIDAS_CCXT_COMPARE:-binance,coinbase,kraken,bitfinex,okx,kucoin}
      # AI copilot (optional) — without a key the AI panel returns 503
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MIDAS_AI_MODEL: ${MIDAS_AI_MODEL:-claude-sonnet-4-6}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Public demo posture: mock data, no trading, no signups.
      MIDAS_DEMO_MODE: ${MIDAS_DEMO_MODE:-false}
      HOST: 0.0.0.0
      PORT: "4000"
      # Background alert engine — rules + triggers persist in the data volume.
      MIDAS_DATA_DIR: /app/data
      MIDAS_ALERT_INTERVAL_MS: ${MIDAS_ALERT_INTERVAL_MS:-15000}
      # Optional: deliver fired alerts to a webhook (Discord/Slack/custom).
      MIDAS_ALERT_WEBHOOK: ${MIDAS_ALERT_WEBHOOK:-}
      # Optional multi-user auth (off by default; users persist in the volume).
      MIDAS_AUTH_ENABLED: ${MIDAS_AUTH_ENABLED:-false}
      MIDAS_AUTH_ALLOW_SIGNUP: ${MIDAS_AUTH_ALLOW_SIGNUP:-true}
      MIDAS_AUTH_SECRET: ${MIDAS_AUTH_SECRET:-}
      # Optional account access (read-only keys → BAL/ORD/POSN/FILLS go live).
      MIDAS_CCXT_API_KEY: ${MIDAS_CCXT_API_KEY:-}
      MIDAS_CCXT_SECRET: ${MIDAS_CCXT_SECRET:-}
      MIDAS_CCXT_PASSWORD: ${MIDAS_CCXT_PASSWORD:-}
      # Optional second keyed venue (multi-venue account view).
      MIDAS_CCXT_EXCHANGE_2: ${MIDAS_CCXT_EXCHANGE_2:-}
      MIDAS_CCXT_API_KEY_2: ${MIDAS_CCXT_API_KEY_2:-}
      MIDAS_CCXT_SECRET_2: ${MIDAS_CCXT_SECRET_2:-}
      MIDAS_CCXT_PASSWORD_2: ${MIDAS_CCXT_PASSWORD_2:-}
      # Fill notifications: open-order watch cadence in ms (0 = off).
      MIDAS_ACCOUNT_WATCH_MS: ${MIDAS_ACCOUNT_WATCH_MS:-10000}
      # Operator digest cadence in hours (0 = off; 168 = weekly).
      MIDAS_DIGEST_HOURS: ${MIDAS_DIGEST_HOURS:-0}
      # Account equity snapshot cadence in ms (0 = off; default hourly).
      MIDAS_EQUITY_SNAP_MS: ${MIDAS_EQUITY_SNAP_MS:-3600000}
      # Optional live on-chain/DEX source for the DEX panel.
      MIDAS_DEX_SOURCE: ${MIDAS_DEX_SOURCE:-}
      # LIVE trading — OFF by default; see SECURITY.md before enabling.
      MIDAS_TRADING_ENABLED: ${MIDAS_TRADING_ENABLED:-false}
      MIDAS_TRADING_ALLOW_NO_AUTH: ${MIDAS_TRADING_ALLOW_NO_AUTH:-false}
      MIDAS_MAX_ORDER_USD: ${MIDAS_MAX_ORDER_USD:-1000}
      MIDAS_MAX_DAILY_USD: ${MIDAS_MAX_DAILY_USD:-5000}
      MIDAS_CORS_ORIGIN: ${MIDAS_CORS_ORIGIN:-*}
    expose:
      - "4000"
    volumes:
      - midas-data:/app/data
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    ports:
      - "${MIDAS_WEB_PORT:-8080}:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  midas-data:
