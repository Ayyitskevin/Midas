# Maps the Upgrade header so WebSocket requests (/api/stream) get
# `Connection: upgrade` while ordinary requests keep keepalive.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Don't cache the entry document, so deploys are picked up immediately.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Hashed assets are immutable — cache them hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # REST + WebSocket API → the server container.
  location /api/ {
    proxy_pass http://server:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket upgrade for /api/stream.
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 1d;
    proxy_send_timeout 1d;
  }

  # SPA: let the client router handle unknown paths.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
