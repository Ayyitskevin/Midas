name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reviewer launcher tests
        run: pnpm test:reviewer

      - name: Repo and release-governance policy
        run: |
          pnpm check:repo-policy
          pnpm check:governance

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Bundle budget
        run: node scripts/check-bundle.mjs

      - name: Test
        run: pnpm test
