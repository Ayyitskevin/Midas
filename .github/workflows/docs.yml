name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      - 'apps/web/**'
      - 'packages/shared/**'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      - 'apps/web/**'
      - 'packages/shared/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r docs/requirements.txt
      - run: mkdocs build --strict
      # The static demo: the full terminal against an in-browser data engine,
      # served at /demo/ beside the docs. No server anywhere.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @midas/web build:demo
      - run: mkdir -p site/demo && cp -r apps/web/dist-demo/* site/demo/
      - name: Upload Pages artifact
        if: ${{ github.ref == 'refs/heads/main' && vars.MIDAS_PAGES_ENABLED == 'true' }}
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    if: ${{ github.ref == 'refs/heads/main' && vars.MIDAS_PAGES_ENABLED == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
