name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Least privilege by default; job may narrow further.
permissions:
  contents: read

concurrency:
  group: opencode-${{ github.repository }}-${{ github.event.comment.user.login }}
  cancel-in-progress: true

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      # Pin third-party agent action to immutable commit SHA (not @latest).
      # Refresh: gh api "repos/anomalyco/opencode/commits?path=github&per_page=1" --jq '.[0].sha'
      # See docs/WORKFLOW_SECURITY.md.
      - name: Run opencode
        uses: anomalyco/opencode/github@a3b97d9090ccf4aa9ac32268486283e3131e36b4
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/claude-sonnet-4-6
